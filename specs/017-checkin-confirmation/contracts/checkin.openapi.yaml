openapi: "3.0.3"
info:
  title: Check-in Internal API
  version: "1.0.0"
  description: Event entry check-in endpoints for authenticated staff (checker/admin)

servers:
  - url: /internal/checkin
    description: Internal API prefix

paths:
  /scan:
    post:
      summary: Scan QR code and return ticket info
      operationId: scanQr
      tags: [Check-in]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qrToken]
              properties:
                qrToken:
                  type: string
                  description: JWT from QR code
      responses:
        "200":
          description: Ticket info with allowed actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticketId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [paid, pending_confirmation, confirmed, used, reserved, cancelled, expired]
                  attendeeName:
                    type: string
                  eventName:
                    type: string
                  checkedInAt:
                    type: string
                    format: date-time
                    nullable: true
                  allowedActions:
                    type: array
                    items:
                      type: string
                      enum: [confirm_entry_direct, request_confirmation, allow_entry]
        "400":
          description: INVALID_QR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: UNAUTHORIZED
        "403":
          description: FORBIDDEN
        "404":
          description: NOT_FOUND

  /confirm-entry:
    post:
      summary: Direct entry — transition paid → used
      operationId: confirmEntry
      tags: [Check-in]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticketId]
              properties:
                ticketId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Entry confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
        "401":
          description: UNAUTHORIZED
        "403":
          description: FORBIDDEN
        "404":
          description: NOT_FOUND
        "409":
          description: TICKET_NOT_AVAILABLE — already used or status changed

  /request-confirmation:
    post:
      summary: Request buyer confirmation — transition paid → pending_confirmation
      operationId: requestConfirmation
      tags: [Check-in]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticketId]
              properties:
                ticketId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Confirmation request sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
        "401":
          description: UNAUTHORIZED
        "403":
          description: FORBIDDEN
        "404":
          description: NOT_FOUND
        "409":
          description: TICKET_NOT_AVAILABLE

  /allow-entry:
    post:
      summary: Allow entry after buyer confirmed — transition confirmed → used
      operationId: allowEntry
      tags: [Check-in]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticketId]
              properties:
                ticketId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Entry allowed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
        "401":
          description: UNAUTHORIZED
        "403":
          description: FORBIDDEN
        "404":
          description: NOT_FOUND
        "409":
          description: TICKET_NOT_AVAILABLE

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: INVALID_QR
        message:
          type: string
        details:
          type: object
